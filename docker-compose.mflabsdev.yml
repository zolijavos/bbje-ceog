version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceog-dev-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3040:3000"
    env_file:
      - .env.dev
    environment:
      - DATABASE_URL=mysql://ceog:${DB_PASSWORD}@db:3306/ceog
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ceog-dev-network

  db:
    image: mysql:8.0
    container_name: ceog-dev-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=ceog
      - MYSQL_USER=ceog
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ceog_mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ceog-dev-network

volumes:
  ceog_mysql_data:
    driver: local

networks:
  ceog-dev-network:
    driver: bridge
