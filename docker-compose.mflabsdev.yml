services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceog-dev-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3040:3000"
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ceog-dev-network

  db:
    image: mysql:8.0
    container_name: ceog-dev-db
    restart: unless-stopped
    env_file:
      - .env.dev
    volumes:
      - ceog_mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ceog-dev-network

volumes:
  ceog_mysql_data:
    driver: local

networks:
  ceog-dev-network:
    driver: bridge
