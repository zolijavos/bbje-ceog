# CEO Gala - Docker Compose Production Setup
# Usage: docker compose -f docker-compose.prod.yml up -d
# All env vars come from env_file - no shell interpolation needed.

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceog-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ceog-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ceog-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ceog-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: ceog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ceog-network

volumes:
  mysql_data:
    driver: local

networks:
  ceog-network:
    driver: bridge
